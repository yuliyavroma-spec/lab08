name: CPack

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure
        run: cmake -H. -B build
      
      - name: Build
        run: cmake --build build
 - name: Package
        run: |
          cd build
          cmake -G "TGZ" .
          cmake --build . --target package
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: build/*.tar.gz
